<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kolja Grosse</title>
  <meta name="description" content="Persönliche Website von Kolja Grosse.">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="home">

  <div class="hover-bg" aria-hidden="true">
    <div class="hover-bg-layer hover-bg--lebenslauf"></div>
    <div class="hover-bg-layer hover-bg--projekte"></div>
    <div class="hover-bg-layer hover-bg--aviation"></div>
    <div class="hover-bg-layer hover-bg--f1"></div>
    <div class="hover-bg-scrim"></div>
  </div>

  <main class="wrap wrap--wide">
    <header class="hero">
      <div class="hero-mark" aria-hidden="true">KG</div>
      <h1 class="hero-title">Kolja Grosse</h1>
    </header>

    <nav class="tiles" aria-label="Hauptnavigation">

      <a class="tile tile--lebenslauf" href="/lebenslauf/">
        <span class="tile-icon tile-icon--cv" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="5" y="3" width="14" height="18" rx="3" fill="currentColor"/>
            <rect x="8" y="7" width="8" height="1.6" rx="0.8" fill="#fff"/>
            <rect x="8" y="11" width="8" height="1.6" rx="0.8" fill="#fff"/>
            <rect x="8" y="15" width="5" height="1.6" rx="0.8" fill="#fff"/>
          </svg>
        </span>
        <span class="tile-title">Lebenslauf</span>
        <span class="tile-arrow" aria-hidden="true">→</span>
      </a>

      <a class="tile tile--projekte" href="/projekte" data-projects-toggle aria-expanded="false">
        <span class="tile-icon tile-icon--projects" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="3" y="3" width="8" height="8" rx="2.5" fill="currentColor"/>
            <rect x="13" y="3" width="8" height="8" rx="2.5" fill="#fff" fill-opacity="0.6"/>
            <rect x="3" y="13" width="8" height="8" rx="2.5" fill="#fff" fill-opacity="0.6"/>
            <rect x="13" y="13" width="8" height="8" rx="2.5" fill="currentColor"/>
          </svg>
        </span>
        <span class="tile-title">Private Projekte</span>
        <span class="tile-arrow" aria-hidden="true">→</span>
      </a>

      <a class="tile tile--aviation" href="/server-setup">
        <span class="tile-icon tile-icon--aviation" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M21 12.5 3.5 19l3-6.5-3-6.5L21 11.5a0.5 0.5 0 0 1 0 1z" fill="currentColor"/>
            <path d="m6.5 12.5 8-1-8-1z" fill="#fff" fill-opacity="0.7"/>
          </svg>
        </span>
        <span class="tile-title">Aviation</span>
        <span class="tile-arrow" aria-hidden="true">→</span>
      </a>

      <a class="tile tile--f1" href="/interessen">
        <span class="tile-icon tile-icon--f1" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="6.5" cy="17.5" r="3" fill="currentColor"/>
            <circle cx="17.5" cy="17.5" r="3" fill="currentColor"/>
            <path d="M4 15c1.5-6 4-9 9-9h5l-2 4h-6c-2 0-3 2-4 5z" fill="#fff" fill-opacity="0.75"/>
          </svg>
        </span>
        <span class="tile-title">Formula 1</span>
        <span class="tile-arrow" aria-hidden="true">→</span>
      </a>

      <!-- Projekt-Unterkacheln: erscheinen beim Klick auf "Private Projekte" -->
      <a class="tile tile--sub sub-heimnetz" href="#">
        <span class="tile-icon tile-icon--heimnetz" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="4" y="5" width="16" height="6" rx="2" fill="currentColor"/>
            <rect x="4" y="13" width="16" height="6" rx="2" fill="#fff" fill-opacity="0.6"/>
            <circle cx="7.5" cy="8" r="1.1" fill="#fff"/>
            <circle cx="7.5" cy="16" r="1.1" fill="currentColor"/>
          </svg>
        </span>
        <span class="tile-title">Heimnetzwerk</span>
        <span class="tile-arrow" aria-hidden="true">→</span>
      </a>

      <a class="tile tile--sub sub-fashion" href="#">
        <span class="tile-icon tile-icon--fashion" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="7" cy="7" r="1.7" fill="#fff"/>
            <circle cx="12" cy="7" r="1.7" fill="currentColor"/>
            <circle cx="17" cy="7" r="1.7" fill="#fff"/>
            <circle cx="7" cy="12" r="1.7" fill="currentColor"/>
            <circle cx="12" cy="12" r="1.7" fill="#fff"/>
            <circle cx="17" cy="12" r="1.7" fill="currentColor"/>
            <circle cx="7" cy="17" r="1.7" fill="#fff"/>
            <circle cx="12" cy="17" r="1.7" fill="currentColor"/>
            <circle cx="17" cy="17" r="1.7" fill="#fff"/>
          </svg>
        </span>
        <span class="tile-title">Fashion MNIST<br>MLP vs CNN</span>
        <span class="tile-arrow" aria-hidden="true">→</span>
      </a>

      <a class="tile tile--sub sub-aws" href="#">
        <span class="tile-icon tile-icon--aws" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="12" cy="12" r="8.5" fill="currentColor"/>
            <ellipse cx="12" cy="12" rx="3.6" ry="8.5" fill="none" stroke="#fff" stroke-width="1.3" stroke-opacity="0.85"/>
            <path d="M3.7 12h16.6" stroke="#fff" stroke-width="1.3" stroke-opacity="0.85"/>
          </svg>
        </span>
        <span class="tile-title">AWS Website<br>highdefinition.net</span>
        <span class="tile-arrow" aria-hidden="true">→</span>
      </a>

    </nav>

    <footer class="footer">
      &copy; <span id="year">2026</span> Kolja Grosse
    </footer>
  </main>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();

    (function () {
      var body = document.body;
      var projekte = document.querySelector('[data-projects-toggle]');
      if (!projekte) return;

      function setOpen(open) {
        body.classList.toggle('projects-open', open);
        projekte.setAttribute('aria-expanded', open ? 'true' : 'false');
      }

      projekte.addEventListener('click', function (e) {
        e.preventDefault();
        setOpen(!body.classList.contains('projects-open'));
      });

      document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape') setOpen(false);
      });
    })();
  </script>
</body>
</html>
